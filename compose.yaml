services:
  db:
    image: postgres:15-alpine
    container_name: spreetail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spreetail
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spreetail"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: spreetail_api
    restart: unless-stopped
    environment:
      # `db` is the compose service name, resolvable on the shared network.
      DATABASE_URL: "postgresql://postgres:password@db:5432/spreetail?schema=public"
      JWT_SECRET: "supersecretkey"
      PORT: "3001"
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle at build time. Must be reachable from the
        # browser, i.e. the api's published host port (not the compose hostname).
        VITE_API_URL: "http://localhost:3001"
    container_name: spreetail_web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pg_data:
