services:
  db:
    image: postgres:15-alpine
    container_name: spreetail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Mount configuration files to a temporary location to avoid blocking initdb
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    command:
      [
        "postgres",
        "-c",
        "config_file=/etc/postgresql/postgresql.conf",
        "-c",
        "hba_file=/etc/postgresql/pg_hba.conf",
      ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - nginx_proxy_shared

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: spreetail_api
    restart: unless-stopped
    environment:
      # `db` is the compose service name, resolvable on the shared network.
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${API_PORT}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - nginx_proxy_shared

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the client bundle at build time. Must be reachable from the
        # browser, i.e. the api's published host port (not the compose hostname).
        VITE_API_URL: /api
    container_name: spreetail_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    networks:
      - default
      - nginx_proxy_shared

volumes:
  pg_data:

networks:
  nginx_proxy_shared:
    external: true
